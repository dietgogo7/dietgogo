<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YES Form - 관리자 대시보드</title>
    <!-- adminV2 톤앤매너 동일 적용 (해당 경로의 CSS 참조) -->
    <link rel="stylesheet" href="../book-md-reservation/adminV2/css/adminv2.css">
    
    <!-- jQuery ES5 규격 반영 선언 -->
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <style>
        /* 설문 빌더 영역에 필요한 추가 스타일 (adminv2.css의 변수 공유) */
        .builder-empty {
            text-align: center;
            padding: 60px 0;
            color: var(--gray-400);
            background: var(--gray-50);
            border: 1px dashed var(--gray-300);
            border-radius: var(--radius-md);
        }
        .question-item {
            border: 1px solid var(--gray-200);
            border-left: 4px solid var(--primary-500);
            padding: var(--space-5);
            margin-bottom: var(--space-5);
            background: var(--gray-0);
            position: relative;
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            box-shadow: var(--shadow-sm);
        }
        .question-item .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-4);
            border-bottom: 1px solid var(--gray-100);
            padding-bottom: var(--space-3);
        }
        .question-item .header-area strong {
            font-size: var(--text-base);
            color: var(--primary-600);
        }
        .builder-controls {
            display: flex;
            gap: var(--space-4);
            align-items: center;
            margin-top: var(--space-2);
        }
        .q-title-input {
            flex: 1;
        }
        .option-guide {
            margin-top: var(--space-4);
            font-size: var(--text-xs);
            color: var(--gray-500);
            background: var(--gray-50);
            padding: var(--space-3);
            border-radius: var(--radius-sm);
            border: 1px solid var(--gray-200);
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 공통 Sidebar 영역 (jQuery 동적 로드) -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <main class="admin-content">

            <!-- Header Section -->
            <header class="content-header">
                <div>
                    <span class="header-badge">Survey Builder</span>
                    <h2>신규 설문 생성</h2>
                    <p>새로운 설문을 설계하고 고객에게 배포할 설정값을 입력합니다.</p>
                </div>
                <div>
                    <!-- 저장 버튼 -->
                    <button id="btnSave" class="btn-primary">설문 저장 및 발행</button>
                </div>
            </header>

            <!-- Configuration Section (상단 기본 정보) -->
            <section class="section-panel" style="margin-bottom: var(--space-5);">
                <div class="card-title" style="border-bottom:none; margin-bottom:var(--space-2); padding-bottom:0;">기본 설정</div>
                <div class="form-grid">
                    <div class="form-full">
                        <label class="form-label">설문 제목 <span style="color:var(--danger-text);">*</span></label>
                        <input type="text" id="txtTitle" class="admin-input" placeholder="고객에게 노출될 설문 제목을 입력하세요">
                    </div>
                    <div>
                        <label class="form-label">시작 일시 <span style="color:var(--danger-text);">*</span></label>
                        <input type="datetime-local" id="dtStart" class="admin-input">
                    </div>
                    <div>
                        <label class="form-label">종료 일시 <span style="color:var(--danger-text);">*</span></label>
                        <input type="datetime-local" id="dtEnd" class="admin-input">
                    </div>
                    <div>
                        <label class="form-label">대상자 설정</label>
                        <select id="selTarget" class="admin-input">
                            <option value="ALL">전체 고객</option>
                            <option value="MEMBER">회원 전용 (로그인 필수)</option>
                            <option value="VIP">플래티넘/골드 전용</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">보상 설정 (완료 리워드)</label>
                        <select id="selReward" class="admin-input">
                            <option value="0">지급 안함</option>
                            <option value="500P">YES 포인트 500원</option>
                            <option value="1000P">YES 포인트 1,000원</option>
                            <option value="COUPON_10">할인쿠폰 10%</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- Builder Area Section (하단 문항 리스트) -->
            <section class="section-panel">
                <div class="card-title">설문 폼 디자인 (미리보기)</div>
                <div id="builderContainer">
                    <div class="builder-empty">
                        <div style="font-size: 32px; margin-bottom: var(--space-2); opacity: 0.5;">📋</div>
                        좌측 메뉴 하단 문항 라이브러리에서<br>원하는 문항 형태를 클릭하여 추가하세요.
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- 스크립트 로직부 (ES5, jQuery) -->
    <script>
        var questionSequence = 0; // 문항 순번 관리

        $(document).ready(function() {
            // 공통 사이드바 비동기 로딩 및 활성화 상태 반영
            $('#sidebar-container').load('admin_sidebar.html', function() {
                $('.nav-item').removeClass('active');
                $('.nav-item[href="admin.html"]').addClass('active');
                $('#menuQuestionLibrary').show(); // 빌더에서만 전용 메뉴 표시
            });

            // 동적 생성 요소 처리를 위한 버튼 이벤트 위임
            $(document).on('click', '#btnAddQ_Radio', function() { addQuestionBlock('radio'); });
            $(document).on('click', '#btnAddQ_Text', function() { addQuestionBlock('text'); });
            $(document).on('click', '#btnAddQ_Textarea', function() { addQuestionBlock('textarea'); });

            // 삭제 기능 이벤트 위임
            $(document).on('click', '.btn-remove-q', function() {
                if(confirm('해당 문항을 삭제하시겠습니까?')) {
                    $(this).closest('.question-item').fadeOut(200, function() {
                        $(this).remove();
                        reorderQuestions();
                        checkEmptyBuilder();
                    });
                }
            });

            // 저장 기능
            $('#btnSave').on('click', function() {
                saveAdminSurvey();
            });
        });

        // 삭제 후 순서 번호 재정렬 함수
        function reorderQuestions() {
            var currentLen = $('.question-item').length;
            if (currentLen > 0) {
                questionSequence = currentLen;
                $('.question-item').each(function(index) {
                    var newNum = index + 1;
                    $(this).find('.q-num-label').text('문항 ' + newNum + '.');
                });
            } else {
                questionSequence = 0;
            }
        }

        // 문항이 0개일 때 빈 디자인 출력
        function checkEmptyBuilder() {
            if ($('.question-item').length === 0) {
                $('#builderContainer').html(
                    '<div class="builder-empty">' +
                        '<div style="font-size: 32px; margin-bottom: var(--space-2); opacity: 0.5;">📋</div>' +
                        '좌측 메뉴 하단 문항 라이브러리에서<br>원하는 문항 형태를 클릭하여 추가하세요.' +
                    '</div>'
                );
                questionSequence = 0;
            }
        }

        // 문항 블록 추가 생성 함수
        function addQuestionBlock(qType) {
            questionSequence++;
            var $container = $('#builderContainer');
            
            if ($container.find('.builder-empty').length > 0) {
                $container.empty();
            }

            var typeLabel = '';
            if (qType === 'radio') typeLabel = '단일 선택형 (Radio)';
            else if (qType === 'text') typeLabel = '주관식 단답형 (Text)';
            else if (qType === 'textarea') typeLabel = '주관식 서술형 (Textarea)';

            var htmlTemplate = [
                '<div class="question-item" data-type="' + qType + '">',
                '   <div class="header-area">',
                '       <strong><span class="q-num-label">문항 ' + questionSequence + '.</span> <span style="font-weight:normal; color:var(--gray-500); font-size:var(--text-sm);">[' + typeLabel + ']</span></strong>',
                '       <button type="button" class="btn-secondary btn-remove-q" style="color:var(--danger-text); border-color:var(--danger-text); padding:4px 8px; font-size:12px;">삭제</button>',
                '   </div>',
                '   <div class="builder-controls">',
                '       <input type="text" class="admin-input q-title-input" placeholder="사용자에게 노출될 질문 내용을 입력하세요">',
                '       <label class="checkbox-label" style="background:var(--gray-50); padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--gray-200);">',
                '           <input type="checkbox" class="q-required-check" checked> 필수 응답 설정',
                '       </label>',
                '   </div>'
            ];

            if (qType === 'radio') {
                htmlTemplate.push('   <div class="option-guide">');
                htmlTemplate.push('       ※ 관리자용 툴 고도화(Phase 2) 시 드래그앤드롭 보기항목 추가 기능이 반영될 영역입니다.<br>');
                htmlTemplate.push('       현재는 JSON 포맷 설계를 위한 기본 템플릿(옵션 자동 배열)으로 설정됩니다.');
                htmlTemplate.push('   </div>');
            }

            htmlTemplate.push('</div>');

            var $newNode = $(htmlTemplate.join('')).hide();
            $container.append($newNode);
            $newNode.fadeIn(200);
        }

        // 백엔드 전송 프로세스
        function saveAdminSurvey() {
            var title = $('#txtTitle').val();
            var startDt = $('#dtStart').val();
            var endDt = $('#dtEnd').val();

            if ($.trim(title) === '') {
                alert('설문 제목을 필수로 입력해야 합니다.');
                $('#txtTitle').focus();
                return;
            }
            if (startDt === '' || endDt === '') {
                alert('설문 진행 기간을 설정해주세요.');
                return;
            }
            if ($('.question-item').length === 0) {
                alert('최소 1개 이상의 설문 문항을 추가해주세요.');
                return;
            }

            var questionDataArray = [];
            $('.question-item').each(function(index) {
                var qType = $(this).data('type');
                var qTitle = $(this).find('.q-title-input').val();
                var isRequired = $(this).find('.q-required-check').is(':checked');

                questionDataArray.push({
                    "Order": (index + 1),
                    "QuestionType": qType,
                    "Title": qTitle,
                    "IsRequired": isRequired,
                    "Options": (qType === 'radio' ? ["옵션1", "옵션2"] : [])
                });
            });

            var payload = {
                title: title,
                startDate: startDt,
                endDate: endDt,
                target: $('#selTarget').val(),
                rewardId: $('#selReward').val(),
                isActive: true, 
                questionsJsonString: JSON.stringify(questionDataArray)
            };

            console.log("DB Insert Payload => ", payload);
            
            // 향후 MVC 컨트롤러 연동 구역
            // $.post('/Admin/Survey/Create', payload, function(res) { ... });

            alert('설문 발행이 완료되었습니다! 데이터는 콘솔(F12)을 확인하세요.');
        }
    </script>
</body>
</html>
