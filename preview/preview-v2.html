<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미리보기 | 프로젝트 헤일메리 - 예스24</title>
    <meta name="description" content="프로젝트 헤일메리 도서 미리보기 - YES24 인터랙티브 뷰어">
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        /* ===== CSS Variables & Reset ===== */
        :root {
            --yes-primary: #0080ff;
            --yes-red: #e50014;
            --yes-bg: #f5f6f8;
            --yes-white: #ffffff;
            --yes-dark: #222222;
            --yes-gray: #666666;
            --yes-border: #e5e5e5;
            --yes-highlight: rgba(0, 128, 255, 0.15);
            --highlight-pen: rgba(255, 210, 0, 0.45);
            --sidebar-w: 320px;
            --toolbar-h: 50px;
            --thumbbar-h: 88px;
            --ambient-color: 0, 128, 255;
            --page-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
            --transition-fast: 0.25s ease;
            --transition-mid: 0.4s ease;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background: var(--yes-bg);
            color: var(--yes-dark);
            overflow: hidden;
            height: 100vh;
            transition: background var(--transition-mid), color var(--transition-mid);
        }

        /* ===== 집중 모드 ===== */
        body.focus-mode {
            --yes-bg: #111216;
            --yes-white: #1c1d22;
            --yes-dark: #e8e8e8;
            --yes-gray: #aaa;
            --yes-border: #2a2b30;
        }

        body.focus-mode .sidebar {
            background: #18191e;
            border-color: #2a2b30;
        }

        body.focus-mode .viewer-toolbar {
            background: #18191e;
        }

        body.focus-mode .ai-card {
            background: linear-gradient(135deg, #1e2a3a, #1a1f2e);
        }

        body.focus-mode .ai-tag {
            background: rgba(0, 128, 255, 0.2);
            border-color: rgba(0, 128, 255, 0.4);
        }

        body.focus-mode .thumb-bar {
            background: #18191e;
            border-color: #2a2b30;
        }

        body.focus-mode .page-item {
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        /* ===== 레이아웃 ===== */
        .preview-wrap {
            display: flex;
            height: 100vh;
            position: relative;
        }

        /* ===== 사이드바 ===== */
        .sidebar {
            width: var(--sidebar-w);
            padding-top: 10px;
            background: var(--yes-white);
            border-right: 1px solid var(--yes-border);
            display: flex;
            flex-direction: column;
            transition: background var(--transition-mid), border var(--transition-mid);
            z-index: 20;
            overflow-y: auto;
        }

        .sidebar-head {
            padding: 20px;
            padding-top: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--yes-border);
        }

        .sidebar-logo {
            display: block;
            margin-bottom: 4px;
        }

        .sidebar-logo img {
            height: 32px;
            width: auto;
        }

        .sidebar-head h1 {
            font-size: 17px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 4px;
        }

        .sidebar-head .book-meta {
            font-size: 13px;
            color: var(--yes-gray);
        }

        /* AI 인사이트 카드 */
        .ai-card {
            margin: 16px;
            padding: 20px 16px 16px;
            background: linear-gradient(135deg, #eaf4ff, #f0f7ff);
            border-radius: 14px;
            position: relative;
            transition: background var(--transition-mid);
        }

        /* 접기/펼치기 토글 */
        .ai-card-header {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 6px;
            margin-bottom: 10px;
            cursor: default;
        }

        .ai-toggle {
            display: none;
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            color: var(--yes-primary);
            font-size: 12px;
            border-radius: 50%;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, background 0.2s;
            flex-shrink: 0;
        }

        .ai-toggle:hover {
            background: rgba(0, 128, 255, 0.08);
        }

        .ai-card.collapsed .ai-toggle {
            transform: rotate(180deg);
        }

        .ai-card-body {
            overflow: hidden;
            max-height: 500px;
            transition: max-height 0.35s ease, opacity 0.25s ease;
            opacity: 1;
        }

        .ai-card.collapsed .ai-card-body {
            max-height: 0;
            opacity: 0;
        }

        .ai-card-icon {
            position: absolute;
            top: -18px;
            right: 14px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .ai-card-icon img {
            width: 100%;
            height: 100%;
        }

        .ai-card-label {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            font-weight: 700;
            color: var(--yes-primary);
        }

        .ai-card-label::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--yes-primary);
            border-radius: 50%;
            animation: aiPulse 2s infinite;
        }

        @keyframes aiPulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(0.7);
            }
        }

        .ai-card-text {
            font-size: 14px;
            line-height: 1.65;
            color: var(--yes-dark);
            word-break: keep-all;
        }

        .ai-tags {
            margin-top: 12px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .ai-tag {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid var(--yes-primary);
            color: var(--yes-primary);
            background: rgba(0, 128, 255, 0.06);
            transition: background var(--transition-fast);
        }

        /* 주요 문장 */
        .key-sentences {
            padding: 0 16px;
            margin-top: 4px;
        }

        .key-sentences-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .key-sentences-title::before {
            content: '📌';
        }

        .sentence-item {
            font-size: 13px;
            line-height: 1.6;
            padding: 8px 10px;
            margin-bottom: 6px;
            border-left: 3px solid var(--yes-primary);
            background: rgba(0, 128, 255, 0.04);
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            transition: background var(--transition-fast);
        }

        .sentence-item:hover {
            background: rgba(0, 128, 255, 0.1);
        }

        .sentence-page {
            display: block;
            font-size: 11px;
            color: var(--yes-gray);
            margin-top: 3px;
        }

        /* 목차 퀵메뉴 */
        .toc-section {
            padding: 16px;
            margin-top: auto;
        }

        .toc-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .toc-list {
            list-style: none;
        }

        .toc-list li {
            font-size: 13px;
            padding: 7px 0;
            border-bottom: 1px dashed var(--yes-border);
            cursor: pointer;
            color: var(--yes-gray);
            transition: color var(--transition-fast);
        }

        .toc-list li:hover {
            color: var(--yes-primary);
        }

        /* ===== 뷰어 영역 ===== */
        .viewer-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* 상단 툴바 */
        .viewer-toolbar {
            height: var(--toolbar-h);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            background: var(--yes-white);
            border-bottom: 1px solid var(--yes-border);
            z-index: 15;
            transition: background var(--transition-mid), border var(--transition-mid);
        }

        .page-indicator {
            font-size: 14px;
            font-weight: 500;
            color: var(--yes-gray);
        }

        .page-indicator strong {
            color: var(--yes-primary);
        }

        .toolbar-btns {
            display: flex;
            gap: 8px;
        }

        .tool-btn {
            background: transparent;
            border: 1px solid var(--yes-border);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            color: var(--yes-dark);
            font-family: inherit;
            transition: all var(--transition-fast);
        }

        .tool-btn:hover {
            border-color: var(--yes-primary);
            color: var(--yes-primary);
        }

        .tool-btn.active {
            background: var(--yes-primary);
            color: #fff;
            border-color: var(--yes-primary);
        }

        /* 확대/축소 컨트롤 */
        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 2px;
            border: 1px solid var(--yes-border);
            border-radius: 6px;
            overflow: hidden;
        }

        .zoom-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: var(--yes-dark);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
            font-family: inherit;
        }

        .zoom-btn:hover {
            background: var(--yes-highlight);
            color: var(--yes-primary);
        }

        .zoom-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }

        .zoom-btn:disabled:hover {
            background: transparent;
            color: var(--yes-dark);
        }

        .zoom-level {
            font-size: 12px;
            min-width: 42px;
            text-align: center;
            color: var(--yes-gray);
            font-weight: 500;
            border-left: 1px solid var(--yes-border);
            border-right: 1px solid var(--yes-border);
            padding: 6px 0;
            line-height: 1;
        }

        /* 소셜 프루프 토스트 */
        .social-toast {
            position: absolute;
            top: 64px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: rgba(0, 0, 0, 0.82);
            color: #fff;
            padding: 10px 22px;
            border-radius: 24px;
            font-size: 13px;
            z-index: 40;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s, transform 0.4s, visibility 0.4s;
            white-space: nowrap;
        }

        .social-toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* 페이지 스크롤 영역 */
        .pages-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
            scroll-snap-type: y mandatory;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            scroll-behavior: smooth;
            position: relative;
        }

        /* Ambient Light 배경 오버레이 */
        .ambient-glow {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        body.focus-mode .ambient-glow {
            opacity: 0.15;
        }

        /* 페이지 스프레드 (가로 2단) */
        .page-spread {
            display: flex;
            width: 100%;
            max-width: 1224px;
            justify-content: center;
            margin-bottom: 40px;
            scroll-snap-align: center;
            gap: 2px;
            position: relative;
            transition: max-width 0.3s ease;
        }

        .page-item {
            flex: 1;
            position: relative;
            background: #fff;
            max-width: 612px;
            box-shadow: var(--page-shadow);
            transition: box-shadow var(--transition-mid), max-width 0.3s ease;
            overflow: hidden;
        }

        /* 종이 질감 효과 */
        .page-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, transparent 50%, rgba(0, 0, 0, 0.02) 100%);
            pointer-events: none;
        }

        /* 책등 그림자 (가운데 접히는 느낌) */
        .page-spread .page-item:first-child {
            border-radius: 4px 0 0 4px;
            box-shadow: var(--page-shadow), inset -8px 0 12px -6px rgba(0, 0, 0, 0.06);
        }

        .page-spread .page-item:last-child {
            border-radius: 0 4px 4px 0;
            box-shadow: var(--page-shadow), inset 8px 0 12px -6px rgba(0, 0, 0, 0.06);
        }

        .page-item img {
            width: 100%;
            display: block;
        }


        @keyframes hlDraw {
            to {
                transform: scaleX(1);
            }
        }

        /* ===== 플로팅 액션 버튼 ===== */
        .float-actions {
            position: fixed;
            bottom: 110px;
            right: 28px;
            display: flex;
            gap: 10px;
            z-index: 50;
        }

        .act-btn {
            padding: 14px 22px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            border: none;
            font-family: inherit;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            transition: transform var(--transition-fast), box-shadow var(--transition-fast);
        }

        .act-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
        }

        .act-btn-cart {
            background: #fff;
            color: var(--yes-primary);
            border: 1.5px solid var(--yes-primary);
        }

        .act-btn-buy {
            background: var(--yes-primary);
            color: #fff;
        }

        /* ===== 썸네일 네비게이션 ===== */
        .thumb-bar {
            height: var(--thumbbar-h);
            border-top: 1px solid var(--yes-border);
            display: flex;
            align-items: center;
            overflow-x: auto;
            padding: 0 16px;
            background: var(--yes-white);
            gap: 10px;
            z-index: 15;
            transition: background var(--transition-mid), border var(--transition-mid);
        }

        .thumb-bar::-webkit-scrollbar {
            height: 4px;
        }

        .thumb-bar::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 2px;
        }

        .thumb-item {
            width: 42px;
            height: 60px;
            flex-shrink: 0;
            border: 2px solid transparent;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            opacity: 0.5;
            transition: all var(--transition-fast);
            position: relative;
        }

        .thumb-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumb-item.active {
            border-color: var(--yes-primary);
            opacity: 1;
            box-shadow: 0 0 8px rgba(0, 128, 255, 0.3);
        }

        .thumb-item:hover {
            opacity: 0.85;
        }

        .thumb-num {
            position: absolute;
            bottom: 1px;
            right: 2px;
            font-size: 9px;
            color: #fff;
            background: rgba(0, 0, 0, 0.5);
            padding: 0 3px;
            border-radius: 2px;
        }

        /* ===== 반응형: Portrait / 세로 모니터 ===== */
        @media screen and (max-width: 960px),
        screen and (max-aspect-ratio: 3/4) {
            .preview-wrap {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: 240px;
                border-right: none;
                border-bottom: 1px solid var(--yes-border);
                flex-direction: row;
                flex-wrap: wrap;
                overflow-y: auto;
            }

            .sidebar-head {
                display: none;
            }

            .ai-card {
                margin: 10px;
                flex: 1;
                min-width: 200px;
            }

            .ai-toggle {
                display: flex;
            }

            .ai-card-header {
                cursor: pointer;
            }

            .key-sentences {
                display: none;
            }

            .toc-section {
                display: none;
            }

            .page-spread {
                flex-direction: column;
                align-items: center;
                gap: 16px;
                margin-bottom: 24px;
            }

            .page-item {
                max-width: 100%;
                width: 100%;
                border-radius: 4px !important;
                box-shadow: var(--page-shadow) !important;
            }

            .float-actions {
                bottom: 100px;
                right: 16px;
                flex-direction: column;
            }

            .act-btn-buy {
                display: none;
            }

            .act-btn-cart {
                width: 44px;
                height: 44px;
                padding: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.9);
                backdrop-filter: blur(4px);
                border: 1px solid var(--yes-primary);
            }

            .act-btn-cart span {
                display: none;
            }
        }

        /* ===== 페이지 넘김 애니메이션 ===== */
        @keyframes pageFlipIn {
            0% {
                transform: perspective(1200px) rotateY(-12deg) scale(0.96);
                opacity: 0.3;
            }

            100% {
                transform: perspective(1200px) rotateY(0deg) scale(1);
                opacity: 1;
            }
        }

        .page-spread.flip-animate {
            animation: pageFlipIn 0.5s ease-out;
        }

        /* 로딩 스켈레톤 */
        .skeleton {
            background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* ===== 전체 화면 뷰어 ===== */
        .fullscreen-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-viewer.active {
            display: flex;
        }

        /* 상단 헤더 */
        .fs-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.6) 0%, transparent 100%);
            z-index: 10;
        }

        .fs-page-info {
            color: #fff;
            font-size: 14px;
            font-weight: 500;
        }

        .fs-page-info strong {
            color: var(--yes-primary);
        }

        .fs-close {
            width: 40px;
            height: 40px;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 22px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .fs-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* 이미지 영역 */
        .fs-image-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            overflow: hidden;
            touch-action: pan-y pinch-zoom;
            position: relative;
        }

        .fs-image-wrap img {
            max-width: 100%;
            max-height: calc(100vh - 120px);
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
            transition: opacity 0.25s ease;
        }

        /* 좌우 네비게이션 버튼 */
        .fs-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            border: none;
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            font-size: 24px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, opacity 0.2s;
            opacity: 0.7;
        }

        .fs-nav:hover {
            background: rgba(255, 255, 255, 0.25);
            opacity: 1;
        }

        .fs-nav:disabled {
            opacity: 0.2;
            cursor: default;
        }

        .fs-nav-prev {
            left: 12px;
        }

        .fs-nav-next {
            right: 12px;
        }

        /* 하단 미니 프로그레스 바 */
        .fs-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 0 16px;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.6) 0%, transparent 100%);
        }

        .fs-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .fs-dot.active {
            width: 20px;
            border-radius: 3px;
            background: var(--yes-primary);
        }

        /* 모바일 전체 화면 최적화 */
        @media screen and (max-width: 960px),
        screen and (max-aspect-ratio: 3/4) {
            .fs-nav {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }

            .fs-nav-prev {
                left: 6px;
            }

            .fs-nav-next {

            // ===== 2. 페이지 렌더링 =====
            function buildPages() {
                $pagesArea.empty();

                if (isLandscape) {
                    // 가로모드: 2단 펼침면
                    for (var i = 0; i < TOTAL_PAGES; i += 2) {
                        var spreadIdx = Math.floor(i / 2);
                        var $spread = $('<div class="page-spread" data-spread="' + spreadIdx + '"></div>');

                        // 왼쪽 페이지
                        $spread.append(buildPageItem(i));
                        // 오른쪽 페이지 (마지막 홀수 페이지 처리)
                        if (i + 1 < TOTAL_PAGES) {
                            $spread.append(buildPageItem(i + 1));
                        }

                        $pagesArea.append($spread);

                        // 썸네일
                        var thumbLabel = (i + 1) + (i + 1 < TOTAL_PAGES ? '-' + (i + 2) : '');
                        var $thumb = $('<div class="thumb-item" data-spread="' + spreadIdx + '">' +
                            '<img src="' + getPageImageUrl(i) + '" alt="' + thumbLabel + '">' +
                            '<span class="thumb-num">' + thumbLabel + '</span>' +
                            '</div>');
                        $thumbBar.append($thumb);
                    }
                } else {
                    // 세로모드: 1단 단일 페이지
                    for (var j = 0; j < TOTAL_PAGES; j++) {
                        var $spread2 = $('<div class="page-spread" data-spread="' + j + '"></div>');
                        $spread2.append(buildPageItem(j));
                        $pagesArea.append($spread2);

                        var $thumb2 = $('<div class="thumb-item" data-spread="' + j + '">' +
                            '<img src="' + getPageImageUrl(j) + '" alt="p' + (j + 1) + '">' +
                            '<span class="thumb-num">' + (j + 1) + '</span>' +
                            '</div>');
                        $thumbBar.append($thumb2);
                    }
                }

                // 첫 번째 썸네일 활성화
                $thumbBar.find('.thumb-item').first().addClass('active');

                // Intersection Observer 등록
                setupObserver();
            }

            function buildPageItem(pageIdx) {
                var $item = $('<div class="page-item" data-page="' + pageIdx + '"></div>');
                var imgSrc = getPageImageUrl(pageIdx);

                // 지연 로딩: 첫 4페이지만 즉시 로드
                if (pageIdx < 4) {
                    $item.append('<img src="' + imgSrc + '" alt="Page ' + (pageIdx + 1) + '">');
                } else {
                    $item.append('<img data-src="' + imgSrc + '" alt="Page ' + (pageIdx + 1) + '" class="skeleton" style="aspect-ratio:612/900; width:100%;">');
                }

                return $item;
            }

            // ===== 3. Intersection Observer =====
            function setupObserver() {
                if (!('IntersectionObserver' in window)) return;

                var observer = new IntersectionObserver(function (entries) {
                    entries.forEach(function (entry) {
                        var $el = $(entry.target);
                        if (entry.isIntersecting) {
                            $el.addClass('is-visible');
                            // 페이지 넘김 애니메이션
                            if (!$el.data('animated')) {
                                $el.addClass('flip-animate');
                                $el.data('animated', true);
                                setTimeout(function () { $el.removeClass('flip-animate'); }, 600);
                            }

                            // 지연 로딩된 이미지 처리
                            $el.find('img[data-src]').each(function () {
                                var $img = $(this);
                                $img.attr('src', $img.data('src')).removeAttr('data-src').removeClass('skeleton');
                            });

                            // 모바일 엑박 방지: 다음 2개 요소 항목 이미지 미리 로딩
                            $el.nextAll('.page-spread').slice(0, 2).find('img[data-src]').each(function () {
                                var $img = $(this);
                                $img.attr('src', $img.data('src')).removeAttr('data-src').removeClass('skeleton');
                            });

                            // 페이지 표시기 갱신
                            var spreadIdx = $el.data('spread');
                            var pageNum;
                            if (isLandscape) {
                                pageNum = spreadIdx * 2 + 1;
                            } else {
                                pageNum = spreadIdx + 1;
                            }
                            $('#pageIndicator').html('<strong>' + pageNum + '</strong> / ' + TOTAL_PAGES);

                            // 썸네일 활성화
                            $('.thumb-item').removeClass('active');
                            $('.thumb-item[data-spread="' + spreadIdx + '"]').addClass('active');
                        }
                    });
                }, {
                    root: document.getElementById('pagesArea'),
                    rootMargin: '0px',
                    threshold: 0.4
                });

                $('.page-spread').each(function () {
                    observer.observe(this);
                });
            }

            // ===== 4. 썸네일 클릭 =====
            $thumbBar.on('click', '.thumb-item', function () {
                var targetSpread = $(this).data('spread');
                var $targetEl = $('.page-spread[data-spread="' + targetSpread + '"]');
                if ($targetEl.length > 0) {
                    var container = $pagesArea[0];
                    var offsetTop = $targetEl[0].offsetTop - container.offsetTop;
                    $pagesArea.animate({ scrollTop: offsetTop }, 350);

                    });

                    $(this).text('🌙 집중 모드').removeClass('active');
                }
            });

            // ===== 5-1. AI 카드 접기/펼치기 =====
            var $aiCard = $('#aiCard');

            // 모바일 모드 여부 확인
            function isMobileMode() {
                var w = $(window).width();
                var h = $(window).height();
                return (w <= 960 || w / h < 0.75);
            }

                $aiCard.toggleClass('collapsed');
            });

            // 모바일 진입 시 기본 접기

                $aiCard.addClass('collapsed');
            }

            // 리사이즈 시 PC 전환되면 자동 펼침

                if (!isMobileMode()) {
                    $aiCard.removeClass('collapsed');
                }
            });

            // ===== 6. 확대/축소 컨트롤 =====
            var ZOOM_STEPS = [50, 75, 100, 125, 150, 175, 200];
            var BASE_SPREAD_W = 1224;
            var BASE_ITEM_W = 612;
            var currentZoomIdx = 2; // 100% 기본

            function applyZoom(idx) {
                if (idx < 0 || idx >= ZOOM_STEPS.length) return;
                currentZoomIdx = idx;
                var pct = ZOOM_STEPS[idx];
                var ratio = pct / 100;
                var newSpread = Math.round(BASE_SPREAD_W * ratio);
                var newItem = Math.round(BASE_ITEM_W * ratio);

                $('.page-spread').css('max-width', newSpread + 'px');
                $('.page-item').css('max-width', newItem + 'px');
                $('#zoomLevel').text(pct + '%');
                $('#btnZoomIn').prop('disabled', idx >= ZOOM_STEPS.length - 1);
                $('#btnZoomOut').prop('disabled', idx <= 0);
            }

            $('#btnZoomIn').on('click', function () {
                applyZoom(currentZoomIdx + 1);
            });

            $('#btnZoomOut').on('click', function () {
                applyZoom(currentZoomIdx - 1);
            });

            // ===== 12. 전체 화면 뷰어 =====
            var $fsViewer = $('#fullscreenViewer');
            var $fsImage = $('#fsImage');
            var $fsPageInfo = $('#fsPageInfo');
            var $fsProgress = $('#fsProgress');
            var $fsPrev = $('#fsPrev');
            var $fsNext = $('#fsNext');
            var fsCurrentPage = 0;

            // 프로그레스 도트 생성
            function buildFsDots() {
                $fsProgress.empty();
                for (var i = 0; i < TOTAL_PAGES; i++) {
                    var $dot = $('<span class="fs-dot" data-page="' + i + '"></span>');
                    $fsProgress.append($dot);
                }
            }
            buildFsDots();

            // 전체 화면 열기
            function openFullscreen(pageIdx) {
                fsCurrentPage = pageIdx;
                updateFsView();
                $fsViewer.addClass('active');
                $('body').css('overflow', 'hidden');
            }

            // 전체 화면 닫기
            function closeFullscreen() {
                $fsViewer.removeClass('active');
                $('body').css('overflow', '');
            }

            // 뷰 업데이트
            function updateFsView() {
                $fsImage.attr('src', getPageImageUrl(fsCurrentPage));
                $fsPageInfo.html('<strong>' + (fsCurrentPage + 1) + '</strong> / ' + TOTAL_PAGES);
                $fsPrev.prop('disabled', fsCurrentPage <= 0);
                $fsNext.prop('disabled', fsCurrentPage >= TOTAL_PAGES - 1);
                // 도트 활성화
                $fsProgress.find('.fs-dot').removeClass('active');
                $fsProgress.find('.fs-dot[data-page="' + fsCurrentPage + '"]').addClass('active');
            }

            // 이미지 클릭으로 전체 화면 열기
            $pagesArea.on('click', '.page-item img', function () {
                var pageIdx = parseInt($(this).closest('.page-item').data('page'), 10);
                openFullscreen(pageIdx);
            });

            // 닫기 버튼
            $('#fsClose').on('click', closeFullscreen);

            // 배경 클릭으로 닫기 (이미지 영역 밖 클릭)
            $('#fsImageWrap').on('click', function (e) {
                if (e.target === this) {
                    closeFullscreen();
                }
            });

            // ESC 키로 닫기
            $(document).on('keydown', function (e) {
                if (!$fsViewer.hasClass('active')) return;
                if (e.keyCode === 27) { closeFullscreen(); }
                if (e.keyCode === 37) { // 좌 화살표
                    if (fsCurrentPage > 0) {
                        fsCurrentPage--;
                        updateFsView();
                    }
                }
                if (e.keyCode === 39) { // 우 화살표
                    if (fsCurrentPage < TOTAL_PAGES - 1) {
                        fsCurrentPage++;
                        updateFsView();
                    }
                }
            });

            // 이전/다음 버튼
            $fsPrev.on('click', function (e) {
                e.stopPropagation();
                if (fsCurrentPage > 0) {
                    fsCurrentPage--;
                    updateFsView();
                }
            });
            $fsNext.on('click', function (e) {
                e.stopPropagation();
                if (fsCurrentPage < TOTAL_PAGES - 1) {
                    fsCurrentPage++;
                    updateFsView();
                }
            });

            // 도트 클릭
            $fsProgress.on('click', '.fs-dot', function () {
                fsCurrentPage = parseInt($(this).data('page'), 10);
                updateFsView();
            });

            // 터치 스와이프 (모바일)
            var touchStartX = 0;
            var touchStartY = 0;
            var isSwiping = false;

            $('#fsImageWrap').on('touchstart', function (e) {
                var touch = e.originalEvent.touches[0];
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
                isSwiping = true;
            });

            $('#fsImageWrap').on('touchmove', function (e) {
                // 기본 스크롤 방지 (수평 스와이프 시)
                if (!isSwiping) return;
                var touch = e.originalEvent.touches[0];
                var diffX = touch.clientX - touchStartX;
                var diffY = touch.clientY - touchStartY;
                if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 10) {
                    e.preventDefault();
                }
            });

            $('#fsImageWrap').on('touchend', function (e) {
                if (!isSwiping) return;
                isSwiping = false;
                var touch = e.originalEvent.changedTouches[0];
                var diffX = touch.clientX - touchStartX;
                var diffY = touch.clientY - touchStartY;

                // 수평 스와이프 감지 (최소 50px, 수평이 수직보다 클 때)
                if (Math.abs(diffX) > 50 && Math.abs(diffX) > Math.abs(diffY)) {
                    if (diffX < 0 && fsCurrentPage < TOTAL_PAGES - 1) {
                        // 왼쪽 스와이프 → 다음 페이지
                        fsCurrentPage++;
                        updateFsView();
                    } else if (diffX > 0 && fsCurrentPage > 0) {
                        // 오른쪽 스와이프 → 이전 페이지
                        fsCurrentPage--;
                        updateFsView();
                    }
                }
            });
        });
    </script>
</body>

</html>
