<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>리딩런 누적 통계 - 리딩런 BackOffice</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<script src="common.js"></script>
<script>
/* ── 목업 데이터 ── */
var MOCK = {
  campaignStart: '2026-03-01',
  updateDt: '2026-04-11 09:00',
  total: { participant: 12483, session: 54721, readingTime: 1634160, complete: 8847, donationAmt: 88470000 },
  starter: { join: 21560, complete: 18340, remain: 3220, donation: 36680000 },
  half:    { join: 15820, complete: 12430, remain: 3390, donation: 24860000 },
  marathon:{ join:  9440, complete:  6770, remain: 2670, donation: 26930000 },
  daily: [
    { Standard_Date:'2026-04-11', Total_Participant_Count:12483, Total_Donation_Amount:88470000, Total_Complete_Times:8847,
      Starter_Join_Times:21560, Starter_Complete_Times:18340, Half_Join_Times:15820, Half_Complete_Times:12430, Marathon_Join_Times:9440, Marathon_Complete_Times:6770 },
    { Standard_Date:'2026-04-10', Total_Participant_Count:12210, Total_Donation_Amount:85300000, Total_Complete_Times:8612,
      Starter_Join_Times:20980, Starter_Complete_Times:17800, Half_Join_Times:15400, Half_Complete_Times:12050, Marathon_Join_Times:9220, Marathon_Complete_Times:6580 },
    { Standard_Date:'2026-04-09', Total_Participant_Count:11980, Total_Donation_Amount:82100000, Total_Complete_Times:8330,
      Starter_Join_Times:20500, Starter_Complete_Times:17200, Half_Join_Times:14900, Half_Complete_Times:11620, Marathon_Join_Times:8990, Marathon_Complete_Times:6380 },
    { Standard_Date:'2026-04-08', Total_Participant_Count:11750, Total_Donation_Amount:79200000, Total_Complete_Times:7990,
      Starter_Join_Times:20100, Starter_Complete_Times:16700, Half_Join_Times:14500, Half_Complete_Times:11200, Marathon_Join_Times:8740, Marathon_Complete_Times:6110 },
    { Standard_Date:'2026-04-07', Total_Participant_Count:11420, Total_Donation_Amount:76500000, Total_Complete_Times:7710,
      Starter_Join_Times:19600, Starter_Complete_Times:16100, Half_Join_Times:14100, Half_Complete_Times:10810, Marathon_Join_Times:8500, Marathon_Complete_Times:5880 },
  ]
};

function calcRate(c, j) { return j ? ((c/j)*100).toFixed(1) : '0.0'; }

renderLayout({
  title: '리딩런 누적 통계',
  breadcrumb: '리딩런 &gt; <strong>누적 통계 (대시보드)</strong>',
  activePage: 'dashboard',
  content: `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
    <h1 class="page-title">리딩런 누적 통계 (대시보드)</h1>
    <div style="font-size:12px;color:#64748b;display:flex;align-items:center;gap:10px;">
      <span style="background:#fffbeb;border:1px solid #fde68a;color:#92400e;padding:4px 12px;border-radius:20px;font-size:12px;">
        ⚠ 캠페인 시작일 : <strong>${MOCK.campaignStart}</strong>
      </span>
      정보 업데이트일 : <strong>${MOCK.updateDt}</strong> 기준
    </div>
  </div>

  <!-- 전체 누적 -->
  <div class="section-title">전체 누적</div>
  <div class="grid-stat" style="grid-template-columns:repeat(5,1fr);margin-bottom:24px;">
    <div class="stat-card"><div class="stat-label">참여자 누적</div><div class="stat-value" style="color:#2563eb;">${MOCK.total.participant.toLocaleString()}</div><div class="stat-unit">명</div></div>
    <div class="stat-card"><div class="stat-label">세션 누적</div><div class="stat-value" style="color:#4f46e5;">${MOCK.total.session.toLocaleString()}</div><div class="stat-unit">회</div></div>
    <div class="stat-card"><div class="stat-label">누적 독서 시간</div><div class="stat-value" style="color:#7c3aed;">${MOCK.total.readingTime.toLocaleString()}</div><div class="stat-unit">분</div></div>
    <div class="stat-card"><div class="stat-label">누적 완주 횟수</div><div class="stat-value" style="color:#16a34a;">${MOCK.total.complete.toLocaleString()}</div><div class="stat-unit">회</div></div>
    <div class="stat-card"><div class="stat-label">누적 기부 금액</div><div class="stat-value" style="color:#dc2626;">${MOCK.total.donationAmt.toLocaleString()}</div><div class="stat-unit">원</div></div>
  </div>

  <!-- 코스별 현황 -->
  <div class="section-title">코스별 현황</div>
  <div class="grid-stat" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px;">
    <!-- 스타터 -->
    <div class="card">
      <div style="background:#eff6ff;border-bottom:1px solid #bfdbfe;padding:12px 16px;">
        <span class="badge badge-blue">스타터</span> <span style="font-weight:600;color:#1d4ed8;font-size:13px;margin-left:6px;">Starter Course</span>
      </div>
      <div style="padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div style="text-align:center;"><div style="font-size:11px;color:#64748b;margin-bottom:4px;">참여 횟수</div><div style="font-size:20px;font-weight:700;">${MOCK.starter.join.toLocaleString()}</div></div>
        <div style="text-align:center;"><div style="font-size:11px;color:#64748b;margin-bottom:4px;">완주 횟수</div><div style="font-size:20px;font-weight:700;color:#16a34a;">${MOCK.starter.complete.toLocaleString()}</div></div>
        <div style="text-align:center;"><div style="font-size:11px;color:#64748b;margin-bottom:4px;">완주율</div><div style="font-size:20px;font-weight:700;color:#4f46e5;">${calcRate(MOCK.starter.complete,MOCK.starter.join)}%</div></div>
        <div style="text-align:center;"><div style="font-size:11px;color:#64748b;margin-bottom:4px;">잔여 완주 필요</div><div style="font-size:20px;font-weight:700;color:#d97706;">${MOCK.starter.remain.toLocaleString()}</div></div>
        <div style="text-align:center;grid-column:span 2;border-top:1px solid #f1f5f9;padding-top:12px;"><div style="font-size:11px;color:#64748b;margin-bottom:4px;">기부 금액</div><div style="font-size:20px;font-weight:700;color:#dc2626;">${MOCK.starter.donation.toLocaleString()}</div><div style="font-size:11px;color:#94a3b8;">원</div></div>
      </div>
    </div>
    <!-- 하프 -->
    <div class="card">
      <div style="background:#f0fdf4;border-bottom:1px solid #bbf7d0;padding:12px 16px;">
        <span class="badge badge-green">하프</span> <span style="font-weight:600;color:#15803d;font-size:13px;margin-left:6px;">Half Course</span>
      </div>
      <div style="padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div style="text-align:center;"><div style="font-size:11px;color:#64748b;margin-bottom:4px;">참여 횟수</div><div style="font-size:20px;font-weight:700;">${MOCK.half.join.toLocaleString()}</div></div>
        <div style="text-align:center;"><div style="font-size:11px;color:#64748b;margin-bottom:4px;">완주 횟수</div><div style="font-size:20px;font-weight:700;color:#16a34a;">${MOCK.half.complete.toLocaleString()}</div></div>
        <div style="text-align:center;"><div style="font-size:11px;color:#64748b;margin-bottom:4px;">완주율</div><div style="font-size:20px;font-weight:700;color:#4f46e5;">${calcRate(MOCK.half.complete,MOCK.half.join)}%</div></div>
        <div style="text-align:center;"><div style="font-size:11px;color:#64748b;margin-bottom:4px;">잔여 완주 필요</div><div style="font-size:20px;font-weight:700;color:#d97706;">${MOCK.half.remain.toLocaleString()}</div></div>
        <div style="text-align:center;grid-column:span 2;border-top:1px solid #f1f5f9;padding-top:12px;"><div style="font-size:11px;color:#64748b;margin-bottom:4px;">기부 금액</div><div style="font-size:20px;font-weight:700;color:#dc2626;">${MOCK.half.donation.toLocaleString()}</div><div style="font-size:11px;color:#94a3b8;">원</div></div>
      </div>
    </div>
    <!-- 마라톤 -->
    <div class="card">
      <div style="background:#fff7ed;border-bottom:1px solid #fed7aa;padding:12px 16px;">
        <span class="badge badge-yellow">마라톤</span> <span style="font-weight:600;color:#c2410c;font-size:13px;margin-left:6px;">Marathon Course</span>
      </div>
      <div style="padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div style="text-align:center;"><div style="font-size:11px;color:#64748b;margin-bottom:4px;">참여 횟수</div><div style="font-size:20px;font-weight:700;">${MOCK.marathon.join.toLocaleString()}</div></div>
        <div style="text-align:center;"><div style="font-size:11px;color:#64748b;margin-bottom:4px;">완주 횟수</div><div style="font-size:20px;font-weight:700;color:#16a34a;">${MOCK.marathon.complete.toLocaleString()}</div></div>
        <div style="text-align:center;"><div style="font-size:11px;color:#64748b;margin-bottom:4px;">완주율</div><div style="font-size:20px;font-weight:700;color:#4f46e5;">${calcRate(MOCK.marathon.complete,MOCK.marathon.join)}%</div></div>
        <div style="text-align:center;"><div style="font-size:11px;color:#64748b;margin-bottom:4px;">잔여 완주 필요</div><div style="font-size:20px;font-weight:700;color:#d97706;">${MOCK.marathon.remain.toLocaleString()}</div></div>
        <div style="text-align:center;grid-column:span 2;border-top:1px solid #f1f5f9;padding-top:12px;"><div style="font-size:11px;color:#64748b;margin-bottom:4px;">기부 금액</div><div style="font-size:20px;font-weight:700;color:#dc2626;">${MOCK.marathon.donation.toLocaleString()}</div><div style="font-size:11px;color:#94a3b8;">원</div></div>
      </div>
    </div>
  </div>

  <!-- 일별 현황 -->
  <div class="section-title">일별 현황</div>
  <div class="card">
    <div style="overflow-x:auto;">
      <table class="data-table">
        <thead><tr>
          <th>기준일</th><th>참여자</th><th>기부 금액(총)</th><th>완주(총)</th>
          <th>스타터 참여</th><th>스타터 완주</th><th>하프 참여</th><th>하프 완주</th><th>마라톤 참여</th><th>마라톤 완주</th>
        </tr></thead>
        <tbody id="dailyBody"></tbody>
      </table>
    </div>
    <div id="dailyPag"></div>
  </div>
  `
});

// 일별 테이블 렌더
function renderDaily(page) {
  var pageSize = 20, data = MOCK.daily;
  var start = (page-1)*pageSize, end = Math.min(start+pageSize, data.length);
  var rows = '';
  for (var i = start; i < end; i++) {
    var d = data[i];
    rows += '<tr><td>'+d.Standard_Date+'</td><td>'+d.Total_Participant_Count.toLocaleString()+'</td><td>'+d.Total_Donation_Amount.toLocaleString()+'</td><td>'+d.Total_Complete_Times.toLocaleString()+'</td><td>'+d.Starter_Join_Times.toLocaleString()+'</td><td>'+d.Starter_Complete_Times.toLocaleString()+'</td><td>'+d.Half_Join_Times.toLocaleString()+'</td><td>'+d.Half_Complete_Times.toLocaleString()+'</td><td>'+d.Marathon_Join_Times.toLocaleString()+'</td><td>'+d.Marathon_Complete_Times.toLocaleString()+'</td></tr>';
  }
  document.getElementById('dailyBody').innerHTML = rows || '<tr><td colspan="10" style="padding:24px;color:#94a3b8;">데이터가 없습니다.</td></tr>';
  renderPagination('dailyPag', data.length, page, pageSize, 'renderDaily');
}
renderDaily(1);
</script>
</body>
</html>
