<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>리딩런 도서순위 - 리딩런 BackOffice</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<script src="common.js"></script>
<script>
var MOCK_BOOKS = [
  {Goods_No:1234567,Book_Name:'괴테는 모든 것을 말했다',Course_Name:'Marathon',Select_Count:3842,Standard_Date:'2026-04-11'},
  {Goods_No:9876543,Book_Name:'82년생 김지영',Course_Name:'Half',Select_Count:3210,Standard_Date:'2026-04-11'},
  {Goods_No:2345678,Book_Name:'채식주의자',Course_Name:'Starter',Select_Count:2987,Standard_Date:'2026-04-11'},
  {Goods_No:3456789,Book_Name:'아몬드',Course_Name:'Starter',Select_Count:2756,Standard_Date:'2026-04-11'},
  {Goods_No:4567890,Book_Name:'파친코',Course_Name:'Marathon',Select_Count:2541,Standard_Date:'2026-04-11'},
  {Goods_No:5678901,Book_Name:'나미야 잡화점의 기적',Course_Name:'Half',Select_Count:2390,Standard_Date:'2026-04-11'},
  {Goods_No:6789012,Book_Name:'연을 쫓는 아이',Course_Name:'Marathon',Select_Count:2201,Standard_Date:'2026-04-11'},
  {Goods_No:7890123,Book_Name:'데미안',Course_Name:'Starter',Select_Count:2089,Standard_Date:'2026-04-11'},
  {Goods_No:8901234,Book_Name:'어린 왕자',Course_Name:'Starter',Select_Count:1987,Standard_Date:'2026-04-11'},
  {Goods_No:9012345,Book_Name:'노르웨이의 숲',Course_Name:'Half',Select_Count:1876,Standard_Date:'2026-04-11'},
  {Goods_No:1122334,Book_Name:'멋진 신세계',Course_Name:'Marathon',Select_Count:1754,Standard_Date:'2026-04-11'},
  {Goods_No:2233445,Book_Name:'1984',Course_Name:'Marathon',Select_Count:1643,Standard_Date:'2026-04-11'},
  {Goods_No:3344556,Book_Name:'동물농장',Course_Name:'Starter',Select_Count:1521,Standard_Date:'2026-04-11'},
  {Goods_No:4455667,Book_Name:'어둠의 왼손',Course_Name:'Half',Select_Count:1432,Standard_Date:'2026-04-11'},
  {Goods_No:5566778,Book_Name:'그리고 아무도 없었다',Course_Name:'Half',Select_Count:1321,Standard_Date:'2026-04-11'},
  {Goods_No:6677889,Book_Name:'위대한 개츠비',Course_Name:'Starter',Select_Count:1210,Standard_Date:'2026-04-11'},
  {Goods_No:7788990,Book_Name:'도리언 그레이의 초상',Course_Name:'Half',Select_Count:1098,Standard_Date:'2026-04-11'},
  {Goods_No:8899001,Book_Name:'오만과 편견',Course_Name:'Marathon',Select_Count:987,Standard_Date:'2026-04-11'},
  {Goods_No:9900112,Book_Name:'제인 에어',Course_Name:'Marathon',Select_Count:876,Standard_Date:'2026-04-11'},
  {Goods_No:1011223,Book_Name:'폭풍의 언덕',Course_Name:'Half',Select_Count:765,Standard_Date:'2026-04-11'},
  {Goods_No:1121334,Book_Name:'죄와 벌',Course_Name:'Marathon',Select_Count:654,Standard_Date:'2026-04-11'},
  {Goods_No:1231445,Book_Name:'카라마조프가의 형제들',Course_Name:'Marathon',Select_Count:543,Standard_Date:'2026-04-11'},
  {Goods_No:1341556,Book_Name:'이방인',Course_Name:'Starter',Select_Count:521,Standard_Date:'2026-04-11'},
  {Goods_No:1451667,Book_Name:'페스트',Course_Name:'Half',Select_Count:498,Standard_Date:'2026-04-11'},
  {Goods_No:1561778,Book_Name:'변신',Course_Name:'Starter',Select_Count:476,Standard_Date:'2026-04-11'},
];

var filtered = MOCK_BOOKS.slice();

function courseLabel(name){
  var m={Starter:'<span class="badge badge-blue">스타터</span>',Half:'<span class="badge badge-green">하프</span>',Marathon:'<span class="badge badge-yellow">마라톤</span>'};
  return m[name]||name;
}

renderLayout({
  title:'리딩런 도서순위',
  breadcrumb:'리딩런 도서순위 &gt; <strong>리딩런 도서순위</strong>',
  activePage:'book-ranking',
  content:`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <h1 class="page-title">리딩런 도서순위</h1>
    <div style="font-size:12px;color:#64748b;">정보 업데이트일 : <strong>2026-04-11 09:00</strong> 기준</div>
  </div>

  <div class="search-box">
    <div><label class="form-label">기준일</label>
      <input type="date" id="fDate" class="form-input" style="width:150px;" value="2026-04-11"/>
    </div>
    <div><label class="form-label">코스</label>
      <select id="fCourse" class="form-select" style="width:120px;">
        <option value="">전체</option><option>Starter</option><option>Half</option><option>Marathon</option>
      </select>
    </div>
    <div><label class="form-label">도서명 / 상품번호</label>
      <input type="text" id="fKeyword" class="form-input" style="width:200px;" placeholder="도서명 또는 상품번호" onkeydown="if(event.key==='Enter')doSearch()"/>
    </div>
    <div style="display:flex;gap:6px;align-items:flex-end;">
      <button class="btn btn-primary" onclick="doSearch()">검색</button>
      <button class="btn btn-secondary" onclick="doReset()">초기화</button>
      <button class="btn btn-success" onclick="BO.toast('엑셀 다운로드 요청되었습니다.','success')">↓ 엑셀 다운로드</button>
    </div>
  </div>

  <div style="display:flex;align-items:flex-start;gap:6px;font-size:12px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;margin-bottom:16px;">
    <span style="margin-top:1px;">⚠</span>
    <span>도서 선택 횟수가 많은 순서대로 순위가 표시됩니다 (1~100위). 선택 횟수가 동일한 경우 등록일시가 이른 도서가 높은 순위로 표시됩니다.</span>
  </div>

  <div class="card">
    <div class="card-header">
      <span style="font-size:13px;color:#475569;">총 <strong id="totalCnt">0</strong>건</span>
    </div>
    <div style="overflow-x:auto;">
      <table class="data-table">
        <thead><tr><th style="width:60px;">순위</th><th>도서 상품번호</th><th>도서명</th><th>코스</th><th>선택 횟수</th><th>기준일</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div id="pagination"></div>
  </div>
  `
});

function doSearch() {
  var course = document.getElementById('fCourse').value;
  var kw = document.getElementById('fKeyword').value.trim().toLowerCase();
  filtered = MOCK_BOOKS.filter(function(d) {
    if (course && d.Course_Name !== course) return false;
    if (kw && d.Book_Name.toLowerCase().indexOf(kw) === -1 && String(d.Goods_No).indexOf(kw) === -1) return false;
    return true;
  });
  renderTable(1);
}
function doReset() {
  document.getElementById('fCourse').value = '';
  document.getElementById('fKeyword').value = '';
  filtered = MOCK_BOOKS.slice();
  renderTable(1);
}
function renderTable(page) {
  var pageSize = 20, total = filtered.length;
  document.getElementById('totalCnt').textContent = total.toLocaleString();
  var start = (page-1)*pageSize, end = Math.min(start+pageSize, total);
  var rows = '';
  for (var i = start; i < end; i++) {
    var d = filtered[i];
    var rank = i + 1;
    var rankEl = rank === 1
      ? '<span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:#eab308;color:#fff;font-weight:700;font-size:14px;">1</span>'
      : rank === 2
      ? '<span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:#9ca3af;color:#fff;font-weight:700;font-size:14px;">2</span>'
      : rank === 3
      ? '<span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:#b45309;color:#fff;font-weight:700;font-size:14px;">3</span>'
      : '<strong style="font-size:14px;color:#374151;">'+rank+'</strong>';
    rows += '<tr>' +
      '<td>'+rankEl+'</td>' +
      '<td style="font-family:monospace;font-size:13px;">'+d.Goods_No+'</td>' +
      '<td class="text-left" style="font-weight:500;color:#0f172a;">'+d.Book_Name+'</td>' +
      '<td>'+courseLabel(d.Course_Name)+'</td>' +
      '<td><strong style="color:#2563eb;font-size:14px;">'+d.Select_Count.toLocaleString()+'</strong></td>' +
      '<td style="font-size:12px;">'+d.Standard_Date+'</td>' +
      '</tr>';
  }
  document.getElementById('tableBody').innerHTML = rows || '<tr><td colspan="6" style="padding:24px;color:#94a3b8;">조회된 데이터가 없습니다.</td></tr>';
  renderPagination('pagination', total, page, pageSize, 'renderTable');
}
doSearch();
</script>
</body>
</html>
