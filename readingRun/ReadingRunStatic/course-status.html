<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>코스별 현황 - 리딩런 BackOffice</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<script src="common.js"></script>
<script>
var MOCK_DATA = [];
var COURSES = ['Starter','Half','Marathon'];
var STATUSES = ['IN_PROGRESS','COMPLETED','ABANDONED'];
var MEMBERS = ['yes24_user001','yes24_user002','yes24_user003','yes24_user004','yes24_user005','yes24_user006','yes24_user007','yes24_user008','yes24_user009','yes24_user010'];
for (var i = 0; i < 87; i++) {
  var course = COURSES[i % 3];
  var complete = (i % 5 !== 0);
  MOCK_DATA.push({
    Seq: i+1,
    Member_Id: MEMBERS[i % 10],
    Member_No: 10000 + i,
    Course_Name: course,
    Course_Round_No: Math.floor(i/3)+1,
    Result_Status_Code: complete ? 'COMPLETED' : 'IN_PROGRESS',
    Course_Start_Datetime: '2026-03-' + String(Math.min(i+1,31)).padStart(2,'0') + ' 09:00',
    Complete_Yn: complete,
    Complete_Datetime: complete ? '2026-04-' + String(Math.min(i%28+1,28)).padStart(2,'0') + ' 20:30' : null,
    Badge_Reward_Yn: complete && i%3===0,
    Gift_Reward_Yn: complete && i%4===0,
    Donation_Apply_Yn: complete,
    Regist_Datetime: '2026-03-01 00:00'
  });
}

var filteredData = MOCK_DATA.slice();

function courseLabel(name) {
  var map = {Starter:'<span class="badge badge-blue">스타터</span>',Half:'<span class="badge badge-green">하프</span>',Marathon:'<span class="badge badge-yellow">마라톤</span>'};
  return map[name] || name;
}
function ynBadge(v) { return v ? '<span class="badge badge-green">Y</span>' : '<span class="badge badge-gray">N</span>'; }

renderLayout({
  title: '코스별 현황',
  breadcrumb: '리딩런 &gt; <strong>코스별 현황</strong>',
  activePage: 'course-status',
  content: `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <h1 class="page-title">코스별 현황</h1>
  </div>

  <div class="search-box">
    <div><label class="form-label">코스 선택</label>
      <select id="fCourse" class="form-select" style="width:120px;">
        <option value="">전체</option><option>Starter</option><option>Half</option><option>Marathon</option>
      </select>
    </div>
    <div><label class="form-label">완주 여부</label>
      <select id="fComplete" class="form-select" style="width:110px;">
        <option value="">전체</option><option value="1">완주</option><option value="0">미완주</option>
      </select>
    </div>
    <div><label class="form-label">코스 시작일</label>
      <div style="display:flex;align-items:center;gap:4px;">
        <input type="date" id="fStart" class="form-input" style="width:140px;" value="2026-03-01"/>
        <span style="color:#94a3b8;">~</span>
        <input type="date" id="fEnd" class="form-input" style="width:140px;" value="2026-04-11"/>
      </div>
    </div>
    <div><label class="form-label">회원 ID</label>
      <input type="text" id="fMember" class="form-input" style="width:150px;" placeholder="회원 ID 입력"/>
    </div>
    <div style="display:flex;gap:6px;align-items:flex-end;">
      <button class="btn btn-primary" onclick="doSearch()">검색</button>
      <button class="btn btn-secondary" onclick="doReset()">초기화</button>
      <button class="btn btn-success" onclick="BO.toast('엑셀 다운로드 요청되었습니다.','success')">
        ↓ 엑셀 다운로드
      </button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span style="font-size:13px;color:#475569;">총 <strong id="totalCnt">0</strong>건</span>
    </div>
    <div style="overflow-x:auto;">
      <table class="data-table">
        <thead><tr>
          <th>번호</th><th>회원 ID</th><th>코스명</th><th>코스 회차</th><th>결과 상태</th>
          <th>코스 시작일시</th><th>완주</th><th>완주 일시</th><th>배지</th><th>상품권</th><th>기부</th><th>등록일시</th>
        </tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div id="pagination"></div>
  </div>
  `
});

function doSearch() {
  var course = document.getElementById('fCourse').value;
  var complete = document.getElementById('fComplete').value;
  var member = document.getElementById('fMember').value.trim().toLowerCase();
  filteredData = MOCK_DATA.filter(function(d) {
    if (course && d.Course_Name !== course) return false;
    if (complete === '1' && !d.Complete_Yn) return false;
    if (complete === '0' && d.Complete_Yn) return false;
    if (member && d.Member_Id.indexOf(member) === -1) return false;
    return true;
  });
  renderTable(1);
}
function doReset() {
  document.getElementById('fCourse').value = '';
  document.getElementById('fComplete').value = '';
  document.getElementById('fMember').value = '';
  filteredData = MOCK_DATA.slice();
  renderTable(1);
}
function renderTable(page) {
  var pageSize = 20;
  var total = filteredData.length;
  document.getElementById('totalCnt').textContent = total.toLocaleString();
  var start = (page-1)*pageSize, end = Math.min(start+pageSize, total);
  var rows = '';
  for (var i = start; i < end; i++) {
    var d = filteredData[i], sn = total - i;
    rows += '<tr>' +
      '<td>'+sn+'</td>' +
      '<td class="text-left" style="font-weight:500;">'+d.Member_Id+'</td>' +
      '<td>'+courseLabel(d.Course_Name)+'</td>' +
      '<td>'+d.Course_Round_No+'</td>' +
      '<td><span class="badge '+(d.Complete_Yn?'badge-green':'badge-gray')+'">'+d.Result_Status_Code+'</span></td>' +
      '<td>'+d.Course_Start_Datetime+'</td>' +
      '<td>'+(d.Complete_Yn?'<span class="badge badge-green">완주</span>':'<span class="badge badge-gray">미완주</span>')+'</td>' +
      '<td>'+(d.Complete_Datetime||'-')+'</td>' +
      '<td>'+ynBadge(d.Badge_Reward_Yn)+'</td>' +
      '<td>'+ynBadge(d.Gift_Reward_Yn)+'</td>' +
      '<td>'+ynBadge(d.Donation_Apply_Yn)+'</td>' +
      '<td>'+d.Regist_Datetime+'</td>' +
      '</tr>';
  }
  document.getElementById('tableBody').innerHTML = rows || '<tr><td colspan="12" style="padding:24px;color:#94a3b8;">조회된 데이터가 없습니다.</td></tr>';
  renderPagination('pagination', total, page, pageSize, 'renderTable');
}
doSearch();
</script>
</body>
</html>
